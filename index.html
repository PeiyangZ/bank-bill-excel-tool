<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>网银账单小助手</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="appShell" class="app-shell">
      <header class="window-bar">
        <div class="drag-region"></div>
        <div class="window-actions no-drag">
          <button id="minimizeBtn" class="window-btn" type="button" aria-label="最小化">-</button>
          <button id="maximizeBtn" class="window-btn" type="button" aria-label="最大化">□</button>
          <button id="closeBtn" class="window-btn close-btn" type="button" aria-label="关闭">×</button>
        </div>
      </header>

      <img class="corner-gif" src="./assets/cat-meme.gif" alt="gif" />

      <main class="page-body">
        <h1 class="page-title">网银账单小助手</h1>

        <section class="workspace-shell">
          <div class="module-switcher">
            <button id="moduleSwitcherBtn" class="module-switcher-trigger" type="button" aria-haspopup="true" aria-expanded="false">
              <span class="module-switcher-icon" aria-hidden="true">🔁</span>
              <span id="currentModuleName" class="module-switcher-name">网银账单生成</span>
            </button>
            <div id="moduleSwitcherMenu" class="module-switcher-menu" hidden>
              <button class="module-option is-active" type="button" data-module="statement-generator">网银账单生成</button>
              <button class="module-option" type="button" data-module="new-account-generator">新开账户生成网银账单</button>
            </div>
          </div>

          <section id="statementModulePanel" class="control-board module-panel">
            <div class="control-row">
              <div class="cell left">
                <button id="importFileBtn" class="primary-btn" type="button">导入文件</button>
              </div>
              <div class="cell center">
                <label class="select-label" for="templateSelect">模板</label>
                <select id="templateSelect" class="template-select"></select>
              </div>
              <div class="cell right">
                <div class="export-actions">
                  <button id="exportDetailBtn" class="primary-btn" type="button" disabled>导出明细</button>
                  <button id="exportBalanceBtn" class="secondary-btn export-balance-btn" type="button" disabled>导出余额</button>
                </div>
              </div>
            </div>

            <div class="control-row">
              <div class="cell left">
                <button id="importTemplateBtn" class="secondary-btn" type="button">导入模板</button>
              </div>
              <div class="cell center">
                <div class="button-stack">
                  <button id="manageTemplateBtn" class="secondary-btn" type="button">模板管理</button>
                  <button id="accountMappingBtn" class="secondary-btn" type="button">账户映射</button>
                </div>
              </div>
              <div class="cell right">
                <div id="statusBox" class="status-box">等待操作</div>
              </div>
            </div>
          </section>

          <section id="newAccountModulePanel" class="control-board new-account-panel" hidden>
            <div class="new-account-title">仅支持开户至今未发生交易的账户余额导出</div>
            <div class="new-account-form-row">
              <label class="new-account-field">
                <span class="new-account-label">银行名称</span>
                <input id="newAccountBankNameInput" class="new-account-input" type="text" spellcheck="false" />
              </label>
              <label class="new-account-field">
                <span class="new-account-label">所在地</span>
                <input id="newAccountLocationInput" class="new-account-input" type="text" spellcheck="false" />
              </label>
              <label class="new-account-field">
                <span class="new-account-label">币种</span>
                <div class="new-account-currency-row">
                  <input id="newAccountCurrencyInput" class="new-account-input new-account-currency-input" type="text" spellcheck="false" />
                  <div id="newAccountCurrencyDropdownWrap" class="new-account-currency-dropdown-wrap" hidden>
                    <button
                      id="newAccountCurrencyDropdownBtn"
                      class="new-account-input new-account-currency-dropdown-btn"
                      type="button"
                      aria-haspopup="true"
                      aria-expanded="false"
                    ></button>
                    <div id="newAccountCurrencyDropdownPanel" class="new-account-currency-dropdown-panel" hidden></div>
                  </div>
                  <label class="new-account-checkbox-label">
                    <input id="newAccountMultiCurrencyCheckbox" class="new-account-checkbox" type="checkbox" />
                    <span class="new-account-checkbox-text"><span>多币种</span><span>账户</span></span>
                  </label>
                </div>
              </label>
              <label class="new-account-field">
                <span class="new-account-label">银行账号</span>
                <input id="newAccountBankAccountInput" class="new-account-input" type="text" spellcheck="false" />
              </label>
              <label class="new-account-field">
                <span class="new-account-label">开户日期</span>
                <input id="newAccountOpenDateInput" class="new-account-input" type="text" value="" />
              </label>
            </div>
            <div class="new-account-actions-row">
              <div id="newAccountStatusBox" class="status-box new-account-status-box">等待生成</div>
              <div class="new-account-actions">
                <button id="newAccountGenerateBtn" class="primary-btn" type="button" disabled>生成</button>
                <button id="newAccountExportBtn" class="secondary-btn" type="button" disabled>导出</button>
              </div>
            </div>
          </section>
        </section>
      </main>

      <footer class="page-footer">
        <div class="version-text"><span class="version-label">Version</span> <span id="appVersion">-</span></div>
      </footer>

      <div id="backgroundTool" class="background-tool">
        <button
          id="backgroundPaletteBtn"
          class="palette-trigger"
          type="button"
          aria-label="背景调色盘"
          title="背景调色盘"
        >
          <span class="palette-trigger-emoji" aria-hidden="true">🎨</span>
        </button>

        <section id="backgroundPalettePanel" class="palette-panel" hidden aria-label="背景设置">
          <div class="palette-panel-body">
            <div id="backgroundSpectrumArea" class="palette-spectrum-shell" aria-label="全色谱选色板">
              <canvas
                id="backgroundSpectrumCanvas"
                class="palette-spectrum-canvas"
                width="560"
                height="560"
                aria-hidden="true"
              ></canvas>
              <div id="backgroundSpectrumCrosshair" class="palette-spectrum-crosshair" hidden></div>
            </div>
            <div class="palette-selected-color-box">
              <div id="backgroundSelectedColorSwatch" class="palette-selected-color-swatch" aria-hidden="true"></div>
            </div>
          </div>
          <div class="palette-panel-actions">
            <button id="backgroundResetBtn" class="palette-action danger-text" type="button">重置</button>
            <div class="palette-panel-actions-right">
              <button id="backgroundImportBtn" class="palette-action" type="button">导入背景文件</button>
              <button id="backgroundDoneBtn" class="palette-action solid" type="button">完成</button>
            </div>
          </div>
        </section>
      </div>
    </div>

    <div id="modalRoot"></div>
    <script src="./src/renderer-dialogs.js"></script>
    <script src="./src/renderer-previews.js"></script>
    <script src="./src/renderer.js"></script>
  </body>
</html>
